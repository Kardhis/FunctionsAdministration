spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  flyway:
    enabled: true

app:
  jwt:
    secret: ${APP_JWT_SECRET}
  demo:
    seed-user: false
  auth:
    cookie-secure: true

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
