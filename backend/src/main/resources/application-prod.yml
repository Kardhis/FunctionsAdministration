spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  flyway:
    enabled: true
  jackson:
    time-zone: Europe/Madrid
app:
  jwt:
    secret: ${APP_JWT_SECRET}
  demo:
    seed-user: false
  auth:
    cookie-secure: true
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://168.231.84.188,https://168.231.84.188}


springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  pattern:
    dateformat: dd-MM-yyyy HH:mm:ss
