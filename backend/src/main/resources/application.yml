spring:
  application:
    name: backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  jackson:
    time-zone: Europe/Madrid

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.flywaydb: INFO
  pattern:
    dateformat: dd-MM-yyyy HH:mm:ss

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

app:
  auth:
    cookie-name: access_token
    cookie-same-site: Lax
    cookie-secure: false
  jwt:
    expires-seconds: 3600
  demo:
    seed-user: false
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://168.231.84.188,https://168.231.84.188}
