spring.application.name=backend

# Explicit for clarity in the tutorial
server.port=8080

# Keep actuator available for local checks
management.endpoints.web.exposure.include=health,info

# Phase 1 (JWT in HttpOnly cookie) - development defaults
app.jwt.secret=dev-secret-change-me
app.jwt.expires-seconds=3600
app.auth.cookie-name=access_token
app.auth.cookie-secure=false
app.auth.cookie-same-site=Lax
