spring.application.name=backend

# Explicit for clarity in the tutorial
server.port=8080

# Keep actuator available for local checks
management.endpoints.web.exposure.include=health,info

# =====================
# Database (MySQL) + Flyway
# =====================
# DB defaults assume local MySQL and a database already created as `functions_administration`.
# Override with environment variables as needed.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/functions_administration?useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_0900_ai_ci&serverTimezone=UTC}
spring.datasource.username=${DB_USER:dcastel}
spring.datasource.password=${DB_PASSWORD:NovaVida2026!}

# Flyway is the source of truth for schema changes
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# If the schema existed before Flyway, allow baselining
spring.flyway.baseline-on-migrate=true
logging.level.org.flywaydb=INFO

# Let Flyway migrate even if schema is behind; switch back to validate after migrations applied
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# Seed a demo user in dev (demo@example.com / password)
app.demo.seed-user=true

# Phase 1 (JWT in HttpOnly cookie) - development defaults
app.jwt.secret=dev-secret-change-me
app.jwt.expires-seconds=3600
app.auth.cookie-name=access_token
app.auth.cookie-secure=false
app.auth.cookie-same-site=Lax
